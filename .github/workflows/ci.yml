name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Run smoke test
        run: bash scripts/smoke-test.sh

      - name: Run DB migration test
        run: bash scripts/test-db-migration.sh
