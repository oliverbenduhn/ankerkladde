<VirtualHost *:80>
    DocumentRoot /var/www/html/public
    DirectoryIndex index.php

    SetEnv EINKAUF_DATA_DIR /data

    <Directory /var/www/html>
        AllowOverride None
        Require all denied
    </Directory>

    <Directory /var/www/html/public>
        AllowOverride All
        Options -Indexes +FollowSymLinks
        Require all granted
    </Directory>

    ProxyPass /ws/ ws://websocket:3000/
    ProxyPassReverse /ws/ ws://websocket:3000/

    ErrorLog ${APACHE_LOG_DIR}/ankerkladde-error.log
    CustomLog ${APACHE_LOG_DIR}/ankerkladde-access.log combined
</VirtualHost>
