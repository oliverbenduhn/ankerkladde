<VirtualHost *:80>
    ServerName einkauf.benduhn.de
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/ankerkladde/public
    DirectoryIndex index.php

    # Fuer eine installierbare PWA muss diese App zusaetzlich ueber HTTPS
    # ausgeliefert werden, z. B. ueber einen separaten :443-VHost oder einen
    # TLS-terminierenden Reverse Proxy vor Apache.

    SetEnv EINKAUF_DATA_DIR /var/lib/ankerkladde

    <Directory /var/www/ankerkladde>
        AllowOverride None
        Require all denied
    </Directory>

    <Directory /var/www/ankerkladde/public>
        AllowOverride None
        Options -Indexes +FollowSymLinks
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/ankerkladde-error.log
    CustomLog ${APACHE_LOG_DIR}/ankerkladde-access.log combined
</VirtualHost>
