<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/einkauf/public
    DirectoryIndex index.php

    SetEnv EINKAUF_DATA_DIR /var/lib/einkauf

    <Directory /var/www/einkauf>
        AllowOverride None
        Require all denied
    </Directory>

    <Directory /var/www/einkauf/public>
        AllowOverride None
        Options -Indexes +FollowSymLinks
        Require all granted
    </Directory>

    ErrorLog ${APACHE_LOG_DIR}/einkauf-error.log
    CustomLog ${APACHE_LOG_DIR}/einkauf-access.log combined
</VirtualHost>
