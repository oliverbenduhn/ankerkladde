<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ankerkladde</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --bg: #dce8f0;
      --surface: #eaf3f8;
      --surface-white: #fff;
      --border: #b8d0e0;
      --text-primary: #0d3a5c;
      --text-secondary: #3a7090;
      --text-muted: #7aaac0;
      --accent: #1a6090;
      --accent-light: #2a7ab0;
      --surface-hover: #d0e5f0;
      --error: #c0392b;
      --success: #2e7d32;
    }
    body {
      width: 360px;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg);
      color: var(--text-primary);
    }
    body.is-busy { cursor: progress; }
    body.is-busy .btn { opacity: 0.7; cursor: progress; }
    .topbar {
      padding: 12px 14px;
      background: var(--accent);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .topbar-left {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .topbar img { width: 24px; height: 24px; border-radius: 4px; }
    .topbar-title { font-weight: 600; }
    .tabs { display: flex; gap: 4px; }
    .tab-btn {
      padding: 6px 12px;
      border: none;
      border-radius: 6px;
      background: transparent;
      color: rgba(255,255,255,0.7);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
    }
    .tab-btn:hover { color: #fff; }
    .tab-btn.active { background: rgba(255,255,255,0.2); color: #fff; }
    .content { padding: 12px 14px 14px; display: grid; gap: 10px; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }
    .card > details > summary { color: var(--text-primary); }
    .row { display: grid; gap: 5px; margin-bottom: 8px; }
    .row:last-child { margin-bottom: 0; }
    .row-with-btn { display: flex; gap: 8px; align-items: flex-end; }
    .row-with-btn > *:first-child { flex: 1; }
    .row-with-btn.key-row { align-items: stretch; }
    .row-with-btn.key-row .row { margin-bottom: 0; }
    .row-with-btn.key-row input { min-height: 72px; }
    .row-with-btn.key-row .btn.small { width: 84px; }
    label { font-size: 12px; color: var(--text-secondary); }
    input, select, textarea {
      width: 100%;
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 13px;
      background: var(--surface-white);
      color: var(--text-primary);
      font-family: inherit;
    }
    input::placeholder { color: var(--text-muted); }
    textarea { resize: vertical; min-height: 60px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: var(--accent); }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 8px;
      padding: 10px 12px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .btn:hover { opacity: 0.9; }
    .btn.secondary {
      background: var(--surface-white);
      color: var(--text-primary);
      border: 1px solid var(--border);
    }
    .btn.secondary:hover { background: var(--surface-hover); }
    .btn.small { padding: 8px 10px; font-size: 12px; }
    .status {
      display: none;
      margin: 0 14px;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
    }
    .status.ok { display: block; background: #d4edda; color: #155724; }
    .status.err { display: block; background: #f8d7da; color: #721c24; }
    details summary {
      cursor: pointer;
      list-style: none;
      font-weight: 600;
    }
    details summary::-webkit-details-marker { display: none; }
    .dropzone {
      margin-top: 10px;
      border: 2px dashed var(--border);
      border-radius: 8px;
      padding: 16px 12px;
      text-align: center;
      color: var(--text-muted);
      background: var(--surface-white);
    }
    .dropzone.dragover { border-color: var(--accent); background: var(--surface-hover); color: var(--accent); }
    .section-fields { display: none; }
    .section-fields.visible { display: grid; gap: 10px; }
    .quick-actions { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; }
    .quick-actions .btn.small { min-width: 0; padding-inline: 6px; }
    .hint { margin: 0; font-size: 12px; color: var(--text-muted); }
    .history-list { display: grid; gap: 8px; margin-top: 10px; }
    .history-item {
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      background: var(--surface-white);
      font-size: 12px;
      color: var(--text-primary);
    }
    .history-item strong {
      display: block;
      margin-bottom: 4px;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .history-meta { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
    .history-text { min-width: 0; flex: 1; }
    .history-item .btn.small { width: auto; min-width: 74px; flex-shrink: 0; }
    .setup-screen { display: none; text-align: center; padding: 24px 20px; }
    .setup-screen.visible { display: block; }
    .setup-screen h2 { margin: 0 0 8px; font-size: 18px; }
    .setup-screen p { margin: 0 0 16px; color: var(--text-secondary); font-size: 14px; }
    .setup-screen .btn { margin-top: 12px; }
    .setup-screen .api-fields { text-align: left; }
    .setup-screen .api-fields .row { margin-bottom: 12px; }
  </style>
</head>
<body>
  <div class="topbar">
    <div class="topbar-left">
      <img src="icon.png" alt="" width="24" height="24">
      <span class="topbar-title">Ankerkladde</span>
    </div>
    <div class="tabs">
      <button class="tab-btn active" data-tab="save">Neu</button>
      <button class="tab-btn" data-tab="settings">Einstellungen</button>
    </div>
  </div>
  <div id="status" class="status"></div>

  <div id="setupScreen" class="setup-screen visible">
    <h2>Willkommen</h2>
    <p>Gib deine Ankerkladde URL und den API-Key ein, um loszulegen.</p>
    <div class="api-fields">
      <div class="row">
        <label for="apiUrl">Ankerkladde URL</label>
        <input type="url" id="apiUrl" placeholder="https://ankerkladde.benduhn.de">
      </div>
      <div class="row">
        <label for="apiKey">API-Key</label>
        <input type="password" id="apiKey" placeholder="Aus den Einstellungen kopieren">
      </div>
    </div>
    <button class="btn" id="setupBtn">Verbinden</button>
  </div>

  <div class="content">
    <div id="tab-save" class="tab-content active">
      <div class="card">
        <div class="row">
          <label for="section">Kategorie</label>
          <select id="section">
            <option value="">Laden...</option>
          </select>
        </div>

        <div id="field-name" class="section-fields" style="margin-top: 12px;">
          <div class="row">
            <label for="name">Name / Link</label>
            <input type="text" id="name" placeholder="https://...">
          </div>
        </div>

        <div id="field-quantity" class="section-fields">
          <div class="row">
            <label for="quantity">Menge</label>
            <input type="text" id="quantity" placeholder="1 kg, 3 Stück...">
          </div>
        </div>

        <div id="field-due" class="section-fields">
          <div class="row">
            <label for="dueDate">Fällig am</label>
            <input type="date" id="dueDate">
          </div>
        </div>

        <div id="field-content" class="section-fields">
          <div class="row">
            <label for="content">Inhalt</label>
            <textarea id="content" placeholder="Notiz-Text..."></textarea>
          </div>
        </div>

        <div id="field-file" class="section-fields">
          <label for="fileInput">Datei auswählen</label>
          <input type="file" id="fileInput" multiple>
        </div>

        <div class="row" style="margin-top: 12px;">
          <button class="btn" id="saveManualBtn">Speichern</button>
        </div>

        <div class="row">
          <button class="btn secondary" id="savePageBtn">Aktuelle Seite speichern</button>
        </div>

        <div class="quick-actions">
          <button class="btn small" id="quickSaveLastBtn">Letzte</button>
          <button class="btn small secondary" id="quickSaveLinkBtn">Link</button>
          <button class="btn small secondary" id="quickSaveNoteBtn">Notiz</button>
          <button class="btn small secondary" id="quickFillBtn">Füllen</button>
        </div>
      </div>

      <details class="card">
        <summary>Dateien ablegen</summary>
        <div id="dropzone" class="dropzone">Dateien hierher ziehen</div>
        <p class="hint">Bilder landen im Bilder-Bereich, andere Dateien im Dateien-Bereich.</p>
      </details>

      <details class="card">
        <summary>Zuletzt gespeichert</summary>
        <div id="recentSaves" class="history-list">
          <p class="hint">Noch keine Aktionen gespeichert.</p>
        </div>
      </details>
    </div>

    <div id="tab-settings" class="tab-content">
      <details class="card" open>
        <summary>Verbindung</summary>
        <div class="row" style="margin-top: 12px;">
          <label for="apiUrlEdit">Ankerkladde URL</label>
          <input type="url" id="apiUrlEdit" placeholder="https://ankerkladde.benduhn.de">
        </div>
        <div class="row-with-btn key-row">
          <div class="row" style="flex: 1;">
            <label for="apiKeyEdit">API-Key</label>
            <input type="password" id="apiKeyEdit" placeholder="Aus den Einstellungen kopieren">
          </div>
          <button type="button" class="btn small" id="verifyBtn">Prüfen</button>
        </div>
      </details>

      <details class="card">
        <summary>Standard-Kategorien</summary>
        <div class="row" style="margin-top: 12px;">
          <label for="defaultLinksCategory">Links</label>
          <select id="defaultLinksCategory">
            <option value="">Automatisch</option>
          </select>
        </div>
        <div class="row">
          <label for="defaultNotesCategory">Notizen</label>
          <select id="defaultNotesCategory">
            <option value="">Automatisch</option>
          </select>
        </div>
        <div class="row">
          <label for="defaultImagesCategory">Bilder</label>
          <select id="defaultImagesCategory">
            <option value="">Automatisch</option>
          </select>
        </div>
        <div class="row">
          <label for="defaultFilesCategory">Dateien</label>
          <select id="defaultFilesCategory">
            <option value="">Automatisch</option>
          </select>
        </div>
      </details>
    </div>
  </div>

  <script src="popup.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      const tabs = document.querySelectorAll('.tab-btn');
      const contents = document.querySelectorAll('.tab-content');
      
      tabs.forEach(btn => {
        btn.addEventListener('click', () => {
          tabs.forEach(t => t.classList.remove('active'));
          contents.forEach(c => c.classList.remove('active'));
          btn.classList.add('active');
          const tabId = 'tab-' + btn.dataset.tab;
          const content = document.getElementById(tabId);
          if (content) content.classList.add('active');
        });
      });
    });
  </script>
</body>
</html>
