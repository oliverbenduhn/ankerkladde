<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ankerkladde</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 340px;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f4ef;
      color: #1f2937;
    }
    .topbar {
      padding: 14px 16px;
      background: #17324d;
      color: #fff;
      font-weight: 600;
    }
    .content { padding: 14px 16px 16px; display: grid; gap: 12px; }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }
    .row { display: grid; gap: 6px; margin-bottom: 10px; }
    .row:last-child { margin-bottom: 0; }
    label { font-size: 12px; color: #6b7280; }
    input, select {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 13px;
      background: #fff;
    }
    input:focus, select:focus { outline: none; border-color: #3b82f6; }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      background: #17324d;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .btn.secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .status {
      display: none;
      margin: 0 16px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
    }
    .status.ok { display: block; background: #dcfce7; color: #166534; }
    .status.err { display: block; background: #fee2e2; color: #991b1b; }
    details summary { cursor: pointer; list-style: none; font-weight: 600; }
    details summary::-webkit-details-marker { display: none; }
    .dropzone {
      margin-top: 10px;
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 18px 12px;
      text-align: center;
      color: #64748b;
      background: #f8fafc;
    }
    .dropzone.dragover { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
  </style>
</head>
<body>
  <div class="topbar">Ankerkladde</div>
  <div id="status" class="status"></div>

  <div class="content">
    <div class="card">
      <div class="row">
        <label for="apiUrl">Ankerkladde URL</label>
        <input type="url" id="apiUrl" placeholder="https://ankerkladde.benduhn.de">
      </div>
      <div class="row">
        <label for="apiKey">API-Key</label>
        <input type="password" id="apiKey" placeholder="Aus den Einstellungen kopieren">
      </div>
      <div class="row">
        <label for="targetSection">Standard-Kategorie</label>
        <select id="targetSection">
          <option value="links">Links</option>
          <option value="notes">Notizen</option>
          <option value="shopping">Einkaufen</option>
        </select>
      </div>
      <button class="btn" id="savePageBtn">Aktuelle Seite speichern</button>
    </div>

    <details class="card" open>
      <summary>Dateien ablegen</summary>
      <div id="dropzone" class="dropzone">Dateien hierher ziehen</div>
    </details>

    <button class="btn secondary" id="shareBtn">Browser-Teilen öffnen</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
