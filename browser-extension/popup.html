<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ankerkladde</title>
  <style>
    * { box-sizing: border-box; }
    body {
      width: 340px;
      margin: 0;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
      background: #f7f4ef;
      color: #1f2937;
    }
    .topbar {
      padding: 14px 16px;
      background: #17324d;
      color: #fff;
      font-weight: 600;
    }
    .content { padding: 14px 16px 16px; display: grid; gap: 12px; }
    .card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 12px;
      padding: 12px;
    }
    .row { display: grid; gap: 6px; margin-bottom: 10px; }
    .row:last-child { margin-bottom: 0; }
    .row-with-btn { display: flex; gap: 8px; align-items: flex-end; }
    .row-with-btn > *:first-child { flex: 1; }
    label { font-size: 12px; color: #6b7280; }
    input, select, textarea {
      width: 100%;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 9px 10px;
      font-size: 13px;
      background: #fff;
      font-family: inherit;
    }
    textarea { resize: vertical; min-height: 60px; }
    input:focus, select:focus, textarea:focus { outline: none; border-color: #3b82f6; }
    .btn {
      width: 100%;
      border: 0;
      border-radius: 10px;
      padding: 10px 12px;
      background: #17324d;
      color: #fff;
      font-weight: 600;
      cursor: pointer;
    }
    .btn.secondary {
      background: #e5e7eb;
      color: #111827;
    }
    .btn.small {
      padding: 8px 12px;
      font-size: 12px;
    }
    .status {
      display: none;
      margin: 0 16px;
      padding: 10px 12px;
      border-radius: 10px;
      font-size: 13px;
    }
    .status.ok { display: block; background: #dcfce7; color: #166534; }
    .status.err { display: block; background: #fee2e2; color: #991b1b; }
    body.is-busy { cursor: progress; }
    body.is-busy .btn { opacity: 0.7; cursor: progress; }
    details summary { cursor: pointer; list-style: none; font-weight: 600; }
    details summary::-webkit-details-marker { display: none; }
    .dropzone {
      margin-top: 10px;
      border: 2px dashed #cbd5e1;
      border-radius: 12px;
      padding: 18px 12px;
      text-align: center;
      color: #64748b;
      background: #f8fafc;
    }
    .dropzone.dragover { border-color: #3b82f6; background: #eff6ff; color: #1d4ed8; }
    .section-fields { display: none; }
    .section-fields.visible { display: grid; gap: 10px; }
    .inline-row { display: flex; gap: 8px; }
    .inline-row > * { flex: 1; }
    .hint { margin: 0; font-size: 12px; color: #6b7280; }
  </style>
</head>
<body>
  <div class="topbar">Ankerkladde</div>
  <div id="status" class="status"></div>

  <div class="content">
    <div class="card">
      <div class="row">
        <label for="apiUrl">Ankerkladde URL</label>
        <input type="url" id="apiUrl" placeholder="https://ankerkladde.benduhn.de">
      </div>
      <div class="row-with-btn">
        <div class="row" style="margin-bottom: 0; flex: 1;">
          <label for="apiKey">API-Key</label>
          <input type="password" id="apiKey" placeholder="Aus den Einstellungen kopieren">
        </div>
        <button type="button" class="btn small" id="verifyBtn">Prüfen</button>
      </div>
    </div>

    <details class="card" open>
      <summary>Manuell speichern</summary>
      <div class="row" style="margin-top: 12px;">
        <label for="section">Kategorie</label>
        <select id="section">
          <option value="">Laden...</option>
        </select>
      </div>

      <div id="field-name" class="section-fields">
        <div class="row">
          <label for="name">Name / Link</label>
          <input type="text" id="name" placeholder="https://...">
        </div>
      </div>

      <div id="field-quantity" class="section-fields">
        <div class="row">
          <label for="quantity">Menge</label>
          <input type="text" id="quantity" placeholder="1 kg, 3 Stück...">
        </div>
      </div>

      <div id="field-due" class="section-fields">
        <div class="row">
          <label for="dueDate">Fällig am</label>
          <input type="date" id="dueDate">
        </div>
      </div>

      <div id="field-content" class="section-fields">
        <div class="row">
          <label for="content">Inhalt</label>
          <textarea id="content" placeholder="Notiz-Text..."></textarea>
        </div>
      </div>

      <div id="field-file" class="section-fields">
        <label for="fileInput">Datei auswählen</label>
        <input type="file" id="fileInput" multiple>
      </div>

      <button class="btn" id="saveManualBtn" style="margin-top: 12px;">Speichern</button>
    </details>

    <button class="btn" id="savePageBtn">Aktuelle Seite speichern</button>

    <details class="card">
      <summary>Dateien ablegen</summary>
      <div id="dropzone" class="dropzone">Dateien hierher ziehen</div>
      <p class="hint">Bilder landen im Bilder-Bereich, andere Dateien im Dateien-Bereich.</p>
    </details>
  </div>

  <script src="popup.js"></script>
</body>
</html>
