<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="360" viewBox="0 0 1200 360"
     role="img" aria-labelledby="heroTitle heroDesc">
  <title id="heroTitle">Ankerkladde – mobile Einkaufs-, Todo- und Notizlisten-App</title>
  <desc id="heroDesc">Hero-Board mit Projektname, Nutzenversprechen, Versionsbadge und einer stilisierten Ankerkladde-Karte, die die echten Kategorien Einkauf, Privates, Arbeit, Notizen, Bilder, Dateien und Links zeigt.</desc>

  <defs>
    <linearGradient id="paper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf9"/>
      <stop offset="1" stop-color="#f1e7d8"/>
    </linearGradient>
    <linearGradient id="navy" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#0d3b66"/>
      <stop offset="1" stop-color="#08284a"/>
    </linearGradient>
    <pattern id="rules" width="100" height="34" patternUnits="userSpaceOnUse">
      <path d="M0 33 H100" stroke="#e8e0d5" stroke-width="1"/>
    </pattern>
    <clipPath id="card">
      <rect x="0" y="0" width="380" height="280" rx="18"/>
    </clipPath>
  </defs>

  <!-- canvas -->
  <rect width="1200" height="360" fill="url(#paper)"/>
  <rect x="0" y="0" width="1200" height="360" fill="url(#rules)" opacity="0.55"/>

  <!-- left spine -->
  <g transform="translate(48 36)">
    <rect x="0" y="0" width="14" height="288" rx="4" fill="#0d3b66"/>
    <circle cx="7" cy="20" r="6" fill="#fffdf9" stroke="#0d3b66" stroke-width="2"/>
    <circle cx="7" cy="60" r="6" fill="#fffdf9" stroke="#0d3b66" stroke-width="2"/>
    <circle cx="7" cy="100" r="6" fill="#fffdf9" stroke="#0d3b66" stroke-width="2"/>
    <circle cx="7" cy="140" r="6" fill="#fffdf9" stroke="#0d3b66" stroke-width="2"/>
    <circle cx="7" cy="180" r="6" fill="#fffdf9" stroke="#0d3b66" stroke-width="2"/>
    <circle cx="7" cy="220" r="6" fill="#fffdf9" stroke="#0d3b66" stroke-width="2"/>
    <circle cx="7" cy="260" r="6" fill="#fffdf9" stroke="#0d3b66" stroke-width="2"/>

    <!-- eyebrow + name + tagline -->
    <text x="42" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="14" letter-spacing="2" fill="#7a6350">PHP · PWA · SQLITE</text>
    <text x="42" y="100" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="72" font-weight="800" fill="#2c2416" letter-spacing="-2">Ankerkladde</text>
    <text x="42" y="148" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
          font-size="22" font-weight="500" fill="#3d3024">
      <tspan x="42" dy="0">Einkaufslisten, Todos, Notizen, Bilder, Dateien</tspan>
      <tspan x="42" dy="28">und Links – in einem Notizbuch.</tspan>
    </text>

    <!-- proof chips -->
    <g transform="translate(42 208)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
       font-size="14" font-weight="600">
      <g>
        <rect width="184" height="34" rx="17" fill="#fffdf9" stroke="#e8e0d5"/>
        <circle cx="18" cy="17" r="4" fill="#0d3b66"/>
        <text x="32" y="22" fill="#2c2416">mobile-first PWA</text>
      </g>
      <g transform="translate(196 0)">
        <rect width="206" height="34" rx="17" fill="#fffdf9" stroke="#e8e0d5"/>
        <circle cx="18" cy="17" r="4" fill="#0d3b66"/>
        <text x="32" y="22" fill="#2c2416">SQLite, kein Framework</text>
      </g>
      <g transform="translate(0 44)">
        <rect width="206" height="34" rx="17" fill="#fffdf9" stroke="#e8e0d5"/>
        <circle cx="18" cy="17" r="4" fill="#0d3b66"/>
        <text x="32" y="22" fill="#2c2416">Docker in 60 Sekunden</text>
      </g>
      <g transform="translate(218 44)">
        <rect width="184" height="34" rx="17" fill="#fffdf9" stroke="#e8e0d5"/>
        <circle cx="18" cy="17" r="4" fill="#0d3b66"/>
        <text x="32" y="22" fill="#2c2416">optionaler Live-Sync</text>
      </g>
    </g>

    <!-- meta line -->
    <text x="42" y="306" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
          font-size="13" fill="#7a6350">v5.1.5  ·  MIT  ·  PHP 8.1+  ·  ankerkladde.benduhn.de</text>
  </g>

  <!-- right: ankerkladde notebook card -->
  <g transform="translate(720 40)">
    <!-- shadow -->
    <rect x="6" y="8" width="380" height="280" rx="18" fill="#2c2416" opacity="0.10"/>
    <!-- page -->
    <g clip-path="url(#card)">
      <rect width="380" height="280" fill="url(#paper)"/>
      <!-- spine -->
      <rect x="0" y="0" width="40" height="280" fill="#0d3b66"/>
      <circle cx="20" cy="36" r="5" fill="#fffdf9" stroke="#0d3b66" stroke-width="2"/>
      <circle cx="20" cy="36" r="1.4" fill="#0d3b66"/>
      <circle cx="20" cy="74" r="5" fill="#fffdf9" stroke="#0d3b66" stroke-width="2"/>
      <circle cx="20" cy="74" r="1.4" fill="#0d3b66"/>
      <circle cx="20" cy="112" r="5" fill="#fffdf9" stroke="#0d3b66" stroke-width="2"/>
      <circle cx="20" cy="112" r="1.4" fill="#0d3b66"/>
      <circle cx="20" cy="150" r="5" fill="#fffdf9" stroke="#0d3b66" stroke-width="2"/>
      <circle cx="20" cy="150" r="1.4" fill="#0d3b66"/>
      <circle cx="20" cy="188" r="5" fill="#fffdf9" stroke="#0d3b66" stroke-width="2"/>
      <circle cx="20" cy="188" r="1.4" fill="#0d3b66"/>
      <!-- page rules -->
      <g stroke="#e8e0d5" stroke-width="1">
        <line x1="52" y1="32" x2="368" y2="32"/>
        <line x1="52" y1="70" x2="368" y2="70"/>
        <line x1="52" y1="108" x2="368" y2="108"/>
        <line x1="52" y1="146" x2="368" y2="146"/>
        <line x1="52" y1="184" x2="368" y2="184"/>
        <line x1="52" y1="222" x2="368" y2="222"/>
      </g>
      <!-- title -->
      <text x="56" y="22" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
            font-size="14" font-weight="700" fill="#2c2416">Kategorien</text>
      <text x="56" y="22" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#7a6350"></text>
      <text x="368" y="22" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
            font-size="11" fill="#7a6350">frei konfigurierbar</text>

      <!-- category rows -->
      <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
         font-size="14" fill="#2c2416">
        <!-- Einkauf -->
        <g transform="translate(56 40)">
          <circle cx="6" cy="-4" r="5" fill="none" stroke="#7a6350" stroke-width="1.5"/>
          <text x="20" y="0" font-weight="700">Einkauf</text>
          <text x="304" y="0" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
                font-size="12" fill="#7a6350">Menge · Barcode</text>
        </g>
        <!-- Privat -->
        <g transform="translate(56 76)">
          <circle cx="6" cy="-4" r="5" fill="none" stroke="#7a6350" stroke-width="1.5"/>
          <text x="20" y="0" font-weight="700">Privat</text>
          <text x="304" y="0" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
                font-size="12" fill="#7a6350">Fälligkeit</text>
        </g>
        <!-- Arbeit -->
        <g transform="translate(56 110)">
          <circle cx="6" cy="-4" r="5" fill="none" stroke="#7a6350" stroke-width="1.5"/>
          <text x="20" y="0" font-weight="700">Arbeit</text>
          <text x="304" y="0" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
                font-size="12" fill="#7a6350">Fälligkeit</text>
        </g>
        <!-- Notizen -->
        <g transform="translate(56 146)">
          <rect x="-2" y="-12" width="18" height="14" rx="2" fill="none" stroke="#7a6350" stroke-width="1.5"/>
          <line x1="0" y1="-8" x2="14" y2="-8" stroke="#7a6350" stroke-width="1"/>
          <text x="24" y="0" font-weight="700">Notizen</text>
          <text x="304" y="0" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
                font-size="12" fill="#7a6350">TipTap · Yjs</text>
        </g>
        <!-- Bilder -->
        <g transform="translate(56 182)">
          <rect x="-2" y="-11" width="18" height="14" rx="2" fill="none" stroke="#7a6350" stroke-width="1.5"/>
          <circle cx="7" cy="-4" r="3" fill="none" stroke="#7a6350" stroke-width="1"/>
          <text x="24" y="0" font-weight="700">Bilder</text>
          <text x="304" y="0" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
                font-size="12" fill="#7a6350">Lightbox</text>
        </g>
        <!-- Dateien -->
        <g transform="translate(56 218)">
          <path d="M-2 -10 L8 -10 L14 -4 L14 4 L-2 4 Z" fill="none" stroke="#7a6350" stroke-width="1.5" stroke-linejoin="round"/>
          <text x="24" y="0" font-weight="700">Dateien</text>
          <text x="304" y="0" text-anchor="end" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
                font-size="12" fill="#7a6350">Download</text>
        </g>
      </g>
    </g>
    <!-- card border -->
    <rect width="380" height="280" rx="18" fill="none" stroke="#e8e0d5"/>

    <!-- anchor monogram: lives in the dark spine area, not on top of the rows -->
    <g transform="translate(20 254)">
      <circle r="14" fill="none" stroke="#c8b89a" stroke-width="1.6"/>
      <path d="M0 -7 v10 M-5 2 a5 5 0 0 0 10 0 M-3.5 -3 h7"
            fill="none" stroke="#c8b89a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </g>
  </g>
</svg>