<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="180" viewBox="0 0 1200 180"
     role="img" aria-labelledby="ftTitle ftDesc">
  <title id="ftTitle">Ankerkladde – Funktionsband</title>
  <desc id="ftDesc">Schmales Band mit acht Funktionssymbolen aus dem Projektalltag: Liste, Einkaufen-Modus, Barcode, Notiz, Bild, Datei, Link, Browser-Erweiterung.</desc>

  <defs>
    <linearGradient id="ftPaper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf9"/>
      <stop offset="1" stop-color="#f1e7d8"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="180" fill="url(#ftPaper)"/>

  <g font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
     fill="#2c2416" transform="translate(56 38)">
    <!-- column template -->
    <!-- 1: Liste -->
    <g transform="translate(0 0)">
      <rect width="124" height="100" rx="14" fill="#fffdf9" stroke="#e8e0d5"/>
      <g transform="translate(20 22)" stroke="#0d3b66" stroke-width="2" fill="none" stroke-linecap="round">
        <rect x="0" y="0" width="20" height="26" rx="3"/>
        <line x1="6" y1="8" x2="14" y2="8"/>
        <line x1="6" y1="14" x2="14" y2="14"/>
        <line x1="6" y1="20" x2="11" y2="20"/>
      </g>
      <text x="62" y="78" text-anchor="middle" font-size="14" font-weight="700">Listen</text>
    </g>

    <!-- 2: Einkaufen -->
    <g transform="translate(138 0)">
      <rect width="124" height="100" rx="14" fill="#fffdf9" stroke="#e8e0d5"/>
      <g transform="translate(20 18)" stroke="#0d3b66" stroke-width="2" fill="none" stroke-linecap="round">
        <circle cx="10" cy="14" r="9"/>
        <path d="M6 14 l3 3 l5 -6"/>
      </g>
      <text x="62" y="78" text-anchor="middle" font-size="14" font-weight="700">Einkaufen</text>
    </g>

    <!-- 3: Barcode -->
    <g transform="translate(276 0)">
      <rect width="124" height="100" rx="14" fill="#fffdf9" stroke="#e8e0d5"/>
      <g transform="translate(20 18)" stroke="#0d3b66" stroke-width="2" fill="none" stroke-linecap="round">
        <line x1="0" y1="14" x2="20" y2="14"/>
        <rect x="0" y="6" width="1.5" height="16" fill="#0d3b66"/>
        <rect x="3" y="6" width="1" height="16" fill="#0d3b66"/>
        <rect x="6" y="6" width="2" height="16" fill="#0d3b66"/>
        <rect x="10" y="6" width="1" height="16" fill="#0d3b66"/>
        <rect x="13" y="6" width="1.5" height="16" fill="#0d3b66"/>
        <rect x="17" y="6" width="1" height="16" fill="#0d3b66"/>
      </g>
      <text x="62" y="78" text-anchor="middle" font-size="14" font-weight="700">Barcode</text>
    </g>

    <!-- 4: Notizen -->
    <g transform="translate(414 0)">
      <rect width="124" height="100" rx="14" fill="#fffdf9" stroke="#e8e0d5"/>
      <g transform="translate(20 16)" stroke="#0d3b66" stroke-width="2" fill="none" stroke-linecap="round">
        <path d="M0 4 l8 -4 l12 24 l-8 4 z"/>
        <path d="M2 6 l12 18"/>
      </g>
      <text x="62" y="78" text-anchor="middle" font-size="14" font-weight="700">Notizen</text>
    </g>

    <!-- 5: Bilder -->
    <g transform="translate(552 0)">
      <rect width="124" height="100" rx="14" fill="#fffdf9" stroke="#e8e0d5"/>
      <g transform="translate(20 18)" stroke="#0d3b66" stroke-width="2" fill="none" stroke-linecap="round">
        <rect x="0" y="2" width="20" height="16" rx="2"/>
        <circle cx="6" cy="8" r="2"/>
        <path d="M0 16 l5 -5 l5 4 l4 -3 l6 6"/>
      </g>
      <text x="62" y="78" text-anchor="middle" font-size="14" font-weight="700">Bilder</text>
    </g>

    <!-- 6: Dateien -->
    <g transform="translate(690 0)">
      <rect width="124" height="100" rx="14" fill="#fffdf9" stroke="#e8e0d5"/>
      <g transform="translate(20 18)" stroke="#0d3b66" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M0 2 h8 l4 4 v14 h-12 z"/>
        <path d="M8 2 v4 h4"/>
      </g>
      <text x="62" y="78" text-anchor="middle" font-size="14" font-weight="700">Dateien</text>
    </g>

    <!-- 7: Links -->
    <g transform="translate(828 0)">
      <rect width="124" height="100" rx="14" fill="#fffdf9" stroke="#e8e0d5"/>
      <g transform="translate(20 20)" stroke="#0d3b66" stroke-width="2" fill="none" stroke-linecap="round">
        <path d="M8 12 a4 4 0 0 1 0 -8 h4"/>
        <path d="M12 16 a4 4 0 0 1 0 8 h-4"/>
        <line x1="7" y1="14" x2="17" y2="6"/>
      </g>
      <text x="62" y="78" text-anchor="middle" font-size="14" font-weight="700">Links</text>
    </g>

    <!-- 8: Extension -->
    <g transform="translate(966 0)">
      <rect width="124" height="100" rx="14" fill="#fffdf9" stroke="#e8e0d5"/>
      <g transform="translate(20 18)" stroke="#0d3b66" stroke-width="2" fill="none" stroke-linecap="round" stroke-linejoin="round">
        <path d="M14 2 v8 l4 4 -4 4 v4"/>
        <path d="M6 2 v8 l-4 4 4 4 v4"/>
        <rect x="6" y="2" width="8" height="20" rx="1.5"/>
      </g>
      <text x="62" y="78" text-anchor="middle" font-size="14" font-weight="700">Extension</text>
    </g>
  </g>
</svg>