<svg xmlns="http://www.w3.org/2000/svg"
     width="1200" height="420" viewBox="0 0 1200 420"
     role="img" aria-labelledby="wfTitle wfDesc">
  <title id="wfTitle">So läuft Ankerkladde</title>
  <desc id="wfDesc">Drei-Schritte-Diagramm: SQLite-Datenbank in public/api.php, ESM-Frontend in public/js, optionaler WebSocket-Server für Live-Sync und Versionsbroadcasts.</desc>

  <defs>
    <linearGradient id="wfPaper" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fffdf9"/>
      <stop offset="1" stop-color="#f1e7d8"/>
    </linearGradient>
    <marker id="wfArrow" viewBox="0 0 10 10" refX="9" refY="5"
            markerWidth="10" markerHeight="10" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#0d3b66"/>
    </marker>
  </defs>

  <rect width="1200" height="420" fill="url(#wfPaper)"/>

  <!-- title -->
  <text x="56" y="48" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="14" letter-spacing="2" fill="#7a6350">ARCHITEKTUR</text>
  <text x="56" y="86" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="32" font-weight="800" fill="#2c2416">Wie Ankerkladde zusammenspielt</text>
  <text x="56" y="112" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
        font-size="16" fill="#3d3024">Schlankes PHP-Backend, ESM-Frontend, optionaler Live-Sync. Alles über JSON oder WebSocket.</text>

  <!-- 3 cards -->
  <g transform="translate(56 150)" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif">
    <!-- card 1: Browser / PWA -->
    <g>
      <rect width="340" height="220" rx="16" fill="#fffdf9" stroke="#e8e0d5"/>
      <text x="20" y="34" font-size="14" font-weight="700" fill="#7a6350">01 · CLIENT</text>
      <text x="20" y="62" font-size="20" font-weight="700" fill="#2c2416">PWA im Browser</text>
      <text x="20" y="92" font-size="14" fill="#3d3024">
        <tspan x="20" dy="0">Vanilla-JS-ESM, Service Worker,</tspan>
        <tspan x="20" dy="18">TipTap-Editor, Share Target,</tspan>
        <tspan x="20" dy="18">Barcode-Scanner, installierbar.</tspan>
      </text>
      <g transform="translate(20 170)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
         font-size="12" fill="#0d3b66">
        <text y="0">public/index.php</text>
        <text y="18">public/js/app-*.js</text>
        <text y="36">public/sw.js</text>
      </g>
    </g>

    <!-- card 2: PHP API -->
    <g transform="translate(370 0)">
      <rect width="340" height="220" rx="16" fill="#0d3b66"/>
      <text x="20" y="34" font-size="14" font-weight="700" fill="#c8b89a">02 · API</text>
      <text x="20" y="62" font-size="20" font-weight="700" fill="#fffdf9">public/api.php</text>
      <text x="20" y="92" font-size="14" fill="#e8e0d5">
        <tspan x="20" dy="0">JSON-REST, CSRF-Token,</tspan>
        <tspan x="20" dy="18">Session-Login oder X-API-Key,</tspan>
        <tspan x="20" dy="18">kanonischer Host, Attachment-</tspan>
        <tspan x="20" dy="18">Streaming nie aus dem Webroot.</tspan>
      </text>
      <g transform="translate(20 170)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
         font-size="12" fill="#c8b89a">
        <text y="0">db.php · security.php</text>
        <text y="18">api.php · media.php</text>
        <text y="36">src/* (Repositories)</text>
      </g>
    </g>

    <!-- card 3: SQLite + WS -->
    <g transform="translate(740 0)">
      <rect width="340" height="220" rx="16" fill="#fffdf9" stroke="#e8e0d5"/>
      <text x="20" y="34" font-size="14" font-weight="700" fill="#7a6350">03 · DATEN &amp; LIVE</text>
      <text x="20" y="62" font-size="20" font-weight="700" fill="#2c2416">SQLite + WebSocket</text>
      <text x="20" y="92" font-size="14" fill="#3d3024">
        <tspan x="20" dy="0">Auto-Migrationen beim Start,</tspan>
        <tspan x="20" dy="18">FTS5-Volltextsuche, Anhänge unter</tspan>
        <tspan x="20" dy="18">data/uploads/. Optionaler Yjs-Sync</tspan>
        <tspan x="20" dy="18">und Versionsbroadcast per Node.</tspan>
      </text>
      <g transform="translate(20 170)" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
         font-size="12" fill="#0d3b66">
        <text y="0">data/einkaufsliste.db</text>
        <text y="18">websocket-server/</text>
        <text y="36">docker compose up</text>
      </g>
    </g>
  </g>

  <!-- arrows between cards -->
  <g fill="none" stroke="#0d3b66" stroke-width="2.5" stroke-linecap="round">
    <path d="M398 270 L432 270" marker-end="url(#wfArrow)"/>
    <path d="M768 270 L802 270" marker-end="url(#wfArrow)"/>
  </g>

  <!-- footer note -->
  <text x="56" y="394" font-family="ui-monospace, SFMono-Regular, Menlo, monospace"
        font-size="12" fill="#7a6350">GET/POST → X-CSRF-Token → JSON · Browser-Erweiterung authentifiziert per X-API-Key</text>
</svg>