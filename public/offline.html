<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
    <meta name="theme-color" content="#f5f0eb">
    <title>Offline | Einkaufsliste</title>
    <style>
        :root {
            --bg: #f5f0eb;
            --surface: #fffdf9;
            --border: #e8e0d5;
            --text: #2c2416;
            --muted: #7a6350;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            padding: 24px;
            background: var(--bg);
            color: var(--text);
            font-family: system-ui, -apple-system, sans-serif;
        }

        main {
            width: min(100%, 420px);
            padding: 28px 24px;
            background: var(--surface);
            border: 1.5px solid var(--border);
            border-radius: 18px;
            text-align: center;
        }

        h1 {
            margin: 0 0 12px;
            font-size: 1.4rem;
        }

        p {
            margin: 0;
            color: var(--muted);
            line-height: 1.5;
        }
    </style>
</head>
<body>
<main>
    <h1>Gerade offline</h1>
    <p>Die zuletzt geladene App ist weiter verfuegbar. Sobald die Verbindung wieder da ist, werden neue Daten geladen.</p>
</main>
</body>
</html>
